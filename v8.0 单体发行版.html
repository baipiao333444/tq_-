        details.dst-radar summary:hover { color: #fff; }

        .dst-list::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 2px; }
        .dst-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(0, 255, 0, 0.2); line-height: 1.4; }
        .dst-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .dst-badge-spring { color: #ffaa00; font-weight: bold; }
        .dst-badge-fall { color: #00ccff; font-weight: bold; }

        #elevation-legend {
            position: absolute; bottom: 30px; right: 30px; background: rgba(10, 20, 30, 0.85);
            border: 1px solid #444; border-radius: 8px; padding: 12px 16px; color: #eee;
            font-size: 12px; z-index: 1001; pointer-events: none; backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .legend-title { font-weight: bold; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 6px; letter-spacing: 1px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
        .color-box { width: 18px; height: 18px; display: inline-block; margin-right: 10px; border: 1px solid #222; border-radius: 3px; box-shadow: inset 0 0 4px rgba(0,0,0,0.3); }

        .city-label-container { 
            transition: opacity 0.2s ease-in-out; 
            user-select: none; 
            will-change: transform; 
            backface-visibility: hidden; 
        }
        .city-label-container:hover { transform: scale(1.1); transition: transform 0.2s; }

        .temp-badge {
            background: rgba(15, 30, 25, 0.7); 
            border: 1px solid rgba(0, 255, 0, 0.1); 
            color: #8da190;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: normal; 
            box-shadow: none; 
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }
        .city-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; animation: pulse 1.5s infinite; margin-top: 4px; }
    </style>

        const COUNTRY_MAP = {
            "China": "中国", "United States of America": "美国", "Russia": "俄罗斯", "Canada": "加拿大", "Brazil": "巴西", "Australia": "澳大利亚", "India": "印度", "Argentina": "阿根廷", "Kazakhstan": "哈萨克斯坦", "Algeria": "阿尔及利亚", "Mexico": "墨西哥", "Indonesia": "印尼", "Iran": "伊朗", "Mongolia": "蒙古", "Peru": "秘鲁", "South Africa": "南非", "Colombia": "哥伦比亚", "Egypt": "埃及", "Nigeria": "尼日利亚", "Venezuela": "委内瑞拉", "Pakistan": "巴基斯坦", "Turkey": "土耳其", "Chile": "智利", "Myanmar": "缅甸", "Ukraine": "乌克兰", "France": "法国", "Spain": "西班牙", "Sweden": "瑞典", "Japan": "日本", "Germany": "德国", "United Kingdom": "英国", "Italy": "意大利", "South Korea": "韩国", "Saudi Arabia": "沙特", "Sudan": "苏丹", "Poland": "波兰"
        };

        function generateMarketsData() {
            const targetDateObj = new Date();
            targetDateObj.setDate(targetDateObj.getDate() + CONFIG.prediction.daysOffset);
            const monthNames = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
            const targetDate = `${monthNames[targetDateObj.getMonth()]}-${targetDateObj.getDate()}-${targetDateObj.getFullYear()}`;
            document.getElementById('predict-date').innerText = `Polymarket [${targetDate}]`;
            return CONFIG.stations.map(station => ({
                ...station,
                url: `https://polymarket.com/zh/event/highest-temperature-in-${station.slug}-on-${targetDate}`
            }));
        }

        function getOffsetHours(date, timeZone) {
            try {
                const formatter = new Intl.DateTimeFormat('en-US', { timeZone, timeZoneName: 'shortOffset' });
                const parts = formatter.formatToParts(date);
                const tzString = parts.find(p => p.type === 'timeZoneName').value;
                if (tzString === 'GMT') return 0;
                const match = tzString.match(/GMT([+-])(\d+)(?::(\d+))?/);
                if (match) {
                    const sign = match[1] === '+' ? 1 : -1;
                    const hours = parseInt(match[2], 10);
                    const mins = match[3] ? parseInt(match[3], 10) / 60 : 0;
                    return sign * (hours + mins);
                }
            } catch(e) { return 0; }
            return 0;
        }

        function runDSTScanner() {
            const container = document.getElementById('dst-content');
            const today = new Date();
            today.setUTCHours(12, 0, 0, 0); 
            const events = []; 

            CONFIG.stations.forEach(station => {
                let prevDate = new Date(today.getTime() - 8 * 86400000);
                let prevOffset = getOffsetHours(prevDate, station.tz);

                for (let i = -7; i <= 7; i++) {
                    const currDate = new Date(today.getTime() + i * 86400000);
                    const currOffset = getOffsetHours(currDate, station.tz);

                    if (currOffset !== prevOffset) {
                        const isSpring = currOffset > prevOffset;
                        const dayLabel = i === 0 ? "今天" : (i < 0 ? `${Math.abs(i)}天前` : `${i}天后`);
                        const dateStr = currDate.toISOString().split('T')[0];
                        events.push({
                            timestamp: currDate.getTime(),
                            name: station.name,
                            dayLabel: dayLabel,
                            dateStr: dateStr,
                            badge: isSpring ? '<span class="dst-badge-spring">☀️ 拨快1小时</span>' : '<span class="dst-badge-fall">❄️ 拨慢1小时</span>',
                            offsetStr: `UTC${prevOffset>0?'+'+prevOffset:prevOffset} ➔ UTC${currOffset>0?'+'+currOffset:currOffset}`
                        });
                    }
                    prevOffset = currOffset;
                }
            });

            events.sort((a, b) => a.timestamp - b.timestamp);
            let html = '';
            events.forEach(e => {
                html += `<div class="dst-item"><span style="font-weight:bold; color:#fff;">${e.name}</span> <span style="color:#aaa;">(${e.dayLabel}, ${e.dateStr})</span><br>${e.badge} <span style="color:#888;">| ${e.offsetStr}</span></div>`;
            });
            container.innerHTML = events.length === 0 ? '<div style="color:#aaa; text-align:center; margin-top:10px;">近 7 天无时区跳变</div>' : html;
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        function getVec(lat, lon, r) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(-(r * Math.sin(phi) * Math.cos(theta)), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
        }
        camera.position.copy(getVec(35, 105, 14));

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 6;
        controls.maxDistance = 25;
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        scene.add(sunLight);

        const ELEVATION_STOPS = [{ v: 0, r: 245, g: 222, b: 179 }, { v: 10, r: 170, g: 182, b: 155 }, { v: 30, r: 156, g: 128, b: 96 }, { v: 70, r: 122, g: 92, b: 67 }, { v: 140, r: 74, g: 52, b: 36 }, { v: 200, r: 255, g: 255, b: 255 }, { v: 255, r: 255, g: 255, b: 255 }];
        const COLOR_LUT = new Array(256);
        for (let i = 0; i <= 255; i++) {
            for (let j = 0; j < ELEVATION_STOPS.length - 1; j++) {
                if (i >= ELEVATION_STOPS[j].v && i <= ELEVATION_STOPS[j + 1].v) {
                    const t = (i - ELEVATION_STOPS[j].v) / (ELEVATION_STOPS[j + 1].v - ELEVATION_STOPS[j].v);
                    COLOR_LUT[i] = [Math.round(ELEVATION_STOPS[j].r + t * (ELEVATION_STOPS[j + 1].r - ELEVATION_STOPS[j].r)), Math.round(ELEVATION_STOPS[j].g + t * (ELEVATION_STOPS[j + 1].g - ELEVATION_STOPS[j].g)), Math.round(ELEVATION_STOPS[j].b + t * (ELEVATION_STOPS[j + 1].b - ELEVATION_STOPS[j].b))];
                    break;
                }
            }
            if (!COLOR_LUT[i]) COLOR_LUT[i] = [255, 255, 255];
        }

        async function init() {
            try {
                const markets = generateMarketsData();
                setTimeout(runDSTScanner, 100); 

                const [geoRes, topoFetchRes] = await Promise.all([fetch(CONFIG.base.geoJsonUrl), fetch(CONFIG.textures.topoMap)]);
                if (!topoFetchRes.ok) throw new Error("高程数据下载失败");
                const geoData = await geoRes.json();
                const topoBlob = await topoFetchRes.blob();
                const topoImgUrl = URL.createObjectURL(topoBlob);
                const topoImg = new Image();
                await new Promise((resolve, reject) => { topoImg.onload = resolve; topoImg.onerror = reject; topoImg.src = topoImgUrl; });
                const width = 8192, height = 4096;
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width; tempCanvas.height = height;
                const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
                tempCtx.drawImage(topoImg, 0, 0, width, height);
                const imgData = tempCtx.getImageData(0, 0, width, height);
                const topoData = imgData.data;
                for (let i = 0; i < topoData.length; i += 4) {
                    const grayscale = topoData[i];
                    const color = COLOR_LUT[grayscale];
                    topoData[i] = color[0]; topoData[i + 1] = color[1]; topoData[i + 2] = color[2]; topoData[i + 3] = 255;
                }
                const mainCanvas = document.createElement('canvas');
                mainCanvas.width = width; mainCanvas.height = height;
                const ctx = mainCanvas.getContext('2d');
                ctx.putImageData(imgData, 0, 0);
                tempCanvas.width = 0; tempCanvas.height = 0; URL.revokeObjectURL(topoImgUrl);
                
                const maskCanvas = document.createElement('canvas');
                maskCanvas.width = width; maskCanvas.height = height;
                const maskCtx = maskCanvas.getContext('2d');
                maskCtx.beginPath();
                geoData.features.forEach(f => {
                    const drawPath = (p) => {
                        p.forEach((c, i) => {
                            const x = (c[0] + 180) * (width / 360);
                            const y = (90 - c[1]) * (height / 180);
                            i === 0 ? maskCtx.moveTo(x, y) : maskCtx.lineTo(x, y);
                        });
                        maskCtx.closePath();
                    };
                    if (f.geometry.type === 'Polygon') f.geometry.coordinates.forEach(drawPath); else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(mp => mp.forEach(drawPath));
                });
                maskCtx.fillStyle = "white"; maskCtx.fill();
                ctx.globalCompositeOperation = 'destination-in'; ctx.drawImage(maskCanvas, 0, 0); maskCanvas.width = 0; maskCanvas.height = 0;
                ctx.globalCompositeOperation = 'destination-over'; ctx.fillStyle = CONFIG.styling.oceanColor; ctx.fillRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = 2.0; ctx.strokeStyle = CONFIG.styling.borderColor;
                ctx.beginPath();
                geoData.features.forEach(f => {
                    const drawPath = (p) => {
                        p.forEach((c, i) => {
                            const x = (c[0] + 180) * (width / 360);
                            const y = (90 - c[1]) * (height / 180);
                            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                        });
                        maskCtx.closePath();
                    };
                    if (f.geometry.type === 'Polygon') f.geometry.coordinates.forEach(drawPath); else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(mp => mp.forEach(drawPath));
                });
                ctx.stroke();
                
                geoData.features.forEach(f => {
                    if (f.properties && f.properties.name && COUNTRY_MAP[f.properties.name]) {
                        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                        const getBounds = (p) => {
                            p.forEach(c => {
                                const x = (c[0] + 180) * (width / 360); const y = (90 - c[1]) * (height / 180);
                                if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y;
                            });
                        };
                        if (f.geometry.type === 'Polygon') f.geometry.coordinates.forEach(getBounds); else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(mp => mp.forEach(getBounds));
                        const centerX = (minX + maxX) / 2; const centerY = (minY + maxY) / 2;
                        ctx.font = 'bold 36px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.strokeText(COUNTRY_MAP[f.properties.name], centerX, centerY); ctx.fillStyle = 'rgba(40, 40, 40, 0.9)'; ctx.fillText(COUNTRY_MAP[f.properties.name], centerX, centerY);
                    }
                });
                const finalTexture = new THREE.CanvasTexture(mainCanvas);
                finalTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                finalTexture.colorSpace = THREE.SRGBColorSpace;
                finalTexture.needsUpdate = true;
                
                const earthMat = new THREE.MeshLambertMaterial({ map: finalTexture });
                const earth = new THREE.Mesh(new THREE.SphereGeometry(CONFIG.base.radius, 128, 128), earthMat);
                scene.add(earth);

                const axisPts = [
                    new THREE.Vector3(0, CONFIG.base.radius + 1.2, 0),
                    new THREE.Vector3(0, -(CONFIG.base.radius + 1.2), 0)
                ];
                scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(axisPts), new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 })));

                const equatorPts = [];
                for (let lon = -180; lon <= 180; lon += 2) equatorPts.push(getVec(0, lon, CONFIG.base.radius + 0.01));
                const equatorLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(equatorPts), new THREE.LineDashedMaterial({ color: 0xffaa00, dashSize: 0.15, gapSize: 0.1 }));
                equatorLine.computeLineDistances(); scene.add(equatorLine);

                const meridianPts = [];
                for(let lat = -90; lat <= 90; lat += 2) meridianPts.push(getVec(lat, 0, CONFIG.base.radius + 0.01));
                const meridianLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(meridianPts), new THREE.LineDashedMaterial({ color: 0xff3333, dashSize: 0.15, gapSize: 0.1 }));
                meridianLine.computeLineDistances(); scene.add(meridianLine);

                const markerObjs = [];
                markets.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'city-label-container';
                    div.style.pointerEvents = 'auto';
                    
                    // 🛡️ 优雅降级核心修复：如果没有数据，直接不渲染 DOM 节点，彻底去除 "--" 占位符
                    const yTemp = window.YESTERDAY_TEMP ? window.YESTERDAY_TEMP[m.slug] : null;
                    const tempBadgeHTML = yTemp ? `<div class="temp-badge">${yTemp}</div>` : '';
                    
                    div.innerHTML = `
                        <div style="cursor: pointer; display: flex; align-items: flex-start; gap: 7px;">
                            ${tempBadgeHTML}
                            <div class="city-dot"></div>
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-size: 13px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000, 0 0 5px rgba(0,0,0,0.8); white-space: nowrap;">
                                    ${m.name}
                                </span>
                                <span class="local-time-display" style="font-size: 11px; color: white; text-shadow: 1px 1px 2px #000; font-family: monospace; letter-spacing: 1px; margin-top: 2px;">
                                    --:--
                                </span>
                            </div>
                        </div>
                    `;
                    div.onclick = () => window.open(m.url, '_blank');
                    const obj = new CSS2DObject(div);
                    obj.position.copy(getVec(m.lat, m.lon, CONFIG.base.radius + 0.05));
                    scene.add(obj);
                    markerObjs.push({ obj: obj, element: div, tz: m.tz });
                });
                document.getElementById('loading').style.display = 'none';
                
                function update() {
                    const now = new Date();
                    document.getElementById('sys-time').innerText = now.toISOString();
                    const dh = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
                    const slon = (12 - dh) * 15;
                    const doy = Math.floor((now - new Date(Date.UTC(now.getUTCFullYear(), 0, 0))) / 86400000);
                    const slat = 23.45 * Math.sin(2 * Math.PI * (284 + doy) / 365.25);
                    sunLight.position.copy(getVec(slat, slon, 100));
                    markerObjs.forEach(m => {
                        const timeSpan = m.element.querySelector('.local-time-display');
                        if (timeSpan && m.tz) {
                            timeSpan.innerText = now.toLocaleTimeString('zh-CN', { timeZone: m.tz, hour: '2-digit', minute: '2-digit', hour12: false });
                        }
                    });
                }
                setInterval(update, 1000); update();
                
                (function anim() {
                    requestAnimationFrame(anim); controls.update();
                    const camV = new THREE.Vector3().copy(camera.position).normalize();
                    markerObjs.forEach(m => {
                        const dot = m.obj.position.clone().normalize().dot(camV);
                        m.element.style.opacity = dot < 0.15 ? '0' : '1';
                        m.element.style.pointerEvents = dot < 0.15 ? 'none' : 'auto';
                    });
                    renderer.render(scene, camera); labelRenderer.render(scene, camera);
                })();
            } catch (e) { console.error(e); document.getElementById('loading').innerHTML = `<span style="color:#ff4444;">🚨 渲染失败：<br>${e.message}</span>`; }
        }
        init();
    </script>
</body>
</html>
